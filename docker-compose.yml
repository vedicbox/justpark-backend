services:
  # ─────────────────────────────────────────────
  # Backend — Node.js / Express / TypeScript
  # ─────────────────────────────────────────────
  backend:
    build: .
    container_name: justpark_backend
    restart: unless-stopped
    working_dir: /app
    ports:
      # Maps the backend container port 3000 to host port 5000
      - "5000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-justpark}:${POSTGRES_PASSWORD:-justpark_secret}@postgres:5432/${POSTGRES_DB:-justpark_db}?schema=public"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379"
      REDIS_HOST: "redis"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - justpark_network

  # ─────────────────────────────────────────────
  # PostgreSQL 16 with PostGIS 3.4
  # ─────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: justpark_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-justpark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-justpark_secret}
      POSTGRES_DB: ${POSTGRES_DB:-justpark_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-justpark} -d ${POSTGRES_DB:-justpark_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - justpark_network

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: justpark_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - justpark_network


# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  justpark_network:
    driver: bridge